version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pixelacademy-postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pixelacademy_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: pixelacademy-redis-dev
    ports:
      - "6379:6379"

volumes:
  postgres_dev_data:
