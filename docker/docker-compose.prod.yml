version: '3.8'

services:
  api:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=pixelacademy;Username=postgres;Password=${DB_PASSWORD}
      - ConnectionStrings__RedisConnection=redis:6379
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=PixelAcademy
      - Jwt__Audience=PixelAcademyClient
      - Jwt__ExpirationMinutes=60
      - Cors__AllowedOrigins__0=https://pixelacademy.com
      - Cors__AllowedOrigins__1=https://app.pixelacademy.com
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pixelacademy-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: pixelacademy
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pixelacademy"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pixelacademy-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pixelacademy-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - pixelacademy-network
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:

networks:
  pixelacademy-network:
    driver: bridge
